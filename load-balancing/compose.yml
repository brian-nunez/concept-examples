services:
  web1:
    build: .
    environment:
      - SERVER_NAME=Server-1
    
  web2:
    build: .
    environment:
      - SERVER_NAME=Server-2

  web3:
    build: .
    environment:
      - SERVER_NAME=Server-3

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
      - web3

