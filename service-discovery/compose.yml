services:
  consul:
    image: hashicorp/consul:latest
    command: agent -dev -client=0.0.0.0 -bind='{{ GetInterfaceIP "eth0" }}'
    ports:
      - "8500:8500"

  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./dynamic.yml:/etc/traefik/dynamic.yml
    depends_on:
      - consul

  web1:
    build: .
    ports:
      - "8091:8080"
    environment:
      - SERVER_NAME=web1
    depends_on:
      - consul

  web1-sidecar:
    image: hashicorp/consul:latest
    command: agent -retry-join=consul -data-dir=/tmp/consul
    volumes:
      - ./web1_service.json:/consul/config/web1_service.json
    depends_on:
      - web1
      - consul

  web2:
    build: .
    ports:
      - "8092:8080"
    environment:
      - SERVER_NAME=web2
    depends_on:
      - consul

  web2-sidecar:
    image: hashicorp/consul:latest
    command: agent -retry-join=consul -data-dir=/tmp/consul
    volumes:
      - ./web2_service.json:/consul/config/web2_service.json
    depends_on:
      - web2
      - consul
